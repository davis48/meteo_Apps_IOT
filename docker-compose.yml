services:

  # ── MySQL 8 ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: meteo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meteo_iot
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ── Mosquitto MQTT Broker ─────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: meteo-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"

  # ── Backend Node.js ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meteo-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      PORT: 3002
      # MySQL externe (conteneur mysql ci-dessus)
      MYSQL_EMBEDDED: "false"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: meteo_iot
      # MQTT (conteneur mosquitto ci-dessus)
      MQTT_ENABLED: "true"
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_USER: ""
      MQTT_PASS: ""
      # Simulation
      SIMULATION_INTERVAL_MS: 10000
    volumes:
      - backend_data:/app/data

volumes:
  mysql_data:
  backend_data:
